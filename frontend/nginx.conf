server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy — Producer API (complaints)
    location /api/complaints {
        proxy_pass http://producer:3000/api/complaints;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy — Reports Query API (tickets)
    location /api/tickets {
        proxy_pass http://reports-query:4000/api/tickets;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — todas las rutas que no matcheen un archivo real
    # se sirven con index.html para que React Router las maneje.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (JS, CSS, imágenes, fuentes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Evitar logs por favicon faltante
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        try_files $uri =204;
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
